spring.application.name=edutask-api
# On utilise le port 8080 pour éviter les conflits avec ton autre projet (8082)
server.port=8080

# Configuration MySQL (Basée sur ton projet fonctionnel)
spring.datasource.url=jdbc:mysql://localhost:3306/edutask_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate & JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true