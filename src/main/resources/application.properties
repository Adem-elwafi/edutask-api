# Configuration de la source de données (MySQL via WAMP)
spring.datasource.url=jdbc:mysql://localhost:3306/edutask_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Stratégie de mise ŕ jour de la base (update pour créer les tables automatiquement)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Port de l'application
server.port=8080